<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="J8NIX — Dave Markovich's 3Shamrocks Studio command center. Every project, its status, and exactly what's waiting on you — clickable and actionable.">
    <meta name="theme-color" content="#0f2235">
    <!-- CSP: no eval, no remote scripts. Inline style/script (single-file app) + Google Fonts.
         connect-src is limited to the OPTIONAL, user-key-gated endpoints used only by the
         "Refine with AI" path (Anthropic/OpenAI) and the optional ElevenLabs voice.
         No key is ever shipped in this file. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob: data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.anthropic.com https://api.openai.com https://api.elevenlabs.io; object-src 'none'; base-uri 'none'; form-action 'none'">
    <title>J8NIX™ — 3Shamrocks Studio Command Center</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1c2b;               /* command-center canvas (deep navy) */
            --bg-2: #11283c;
            --panel-bg: #ffffff;
            --header-bg: #0a1622;        /* dark — the J8NIX gold wordmark lives here */
            --header-bg-2: #11283c;
            --accent: #f2c194;           /* brand gold */
            --accent-deep: #e0a878;
            --text: #102a43;
            --text-sub: #5a6b80;
            --neutral: #586475;
            --border: #e3e9f1;
            --shadow: 0 6px 24px rgba(0,0,0,.16);
            --radius: 16px;
            /* status system */
            --st-live: #2f9e63;          --st-live-bg: #e6f5ec;
            --st-prog: #2f74c0;          --st-prog-bg: #e4eefb;
            --st-wait: #d4892a;          --st-wait-bg: #fcf1e1;
            --st-back: #76859a;          --st-back-bg: #eef2f7;
            /* priority */
            --pri-high: #e05650;         --pri-med: #d4892a;          --pri-low: #76859a;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: radial-gradient(1200px 600px at 80% -10%, #16344c 0%, var(--bg) 55%);
            color: #e8eef5;
            font-size: 14px; line-height: 1.5;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;            /* NO PAGE SCROLL — key view above the fold; panels scroll internally */
        }
        :focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
        .skip-link { position: absolute; left: -999px; top: 8px; z-index: 100; background: #fff; color: var(--text); padding: 10px 16px; border-radius: 8px; font-weight: 700; }
        .skip-link:focus { left: 8px; }

        /* ---------------- Header (DARK — J8NIX gold logo) ---------------- */
        header {
            flex: 0 0 auto;
            background: linear-gradient(120deg, var(--header-bg), var(--header-bg-2));
            color: #eaf1f8; padding: 10px 18px;
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
            box-shadow: 0 2px 16px rgba(0,0,0,.35); z-index: 20; flex-wrap: wrap;
            border-bottom: 1px solid rgba(242,193,148,.18);
        }
        .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .logo { height: 32px; width: auto; display: block; }
        .brand .tm { font-size: 10px; font-weight: 800; color: var(--accent); align-self: flex-start; margin: 2px 0 0 -6px; }
        .brand-sub { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; color: var(--accent); text-transform: uppercase; }
        .brand-divider { width: 1px; height: 28px; background: rgba(255,255,255,.16); margin: 0 4px; }
        .user-chip { display: flex; align-items: center; gap: 10px; }
        /* 3Shamrocks mark — ALWAYS on a light badge (brand rule). Never fabricated. */
        .logo-badge { display: inline-flex; align-items: center; justify-content: center; background: #fff; border-radius: 10px; padding: 5px 9px; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
        .logo-badge img { display: block; }
        .user-meta { line-height: 1.2; }
        .user-meta .nm { font-weight: 700; font-size: 13px; color: #fff; }
        .user-meta .sub { font-size: 11px; color: #9fb4c9; }
        .header-right { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
        .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px; font-size: 12px; font-weight: 700; background: rgba(255,255,255,.08); color: #cfe0f0; }
        .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--st-live); }
        .hdr-btn { background: rgba(255,255,255,.08); color: #eaf1f8; border: 1px solid rgba(255,255,255,.14); border-radius: 999px; padding: 8px 13px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
        .hdr-btn:hover { background: rgba(255,255,255,.16); }
        .hdr-btn.gold { background: var(--accent); color: #4a3216; border-color: transparent; }
        .hdr-btn.gold:hover { filter: brightness(1.05); }

        /* ---------------- Workspace grid (above the fold) ---------------- */
        .workspace {
            flex: 1 1 auto; min-height: 0;
            display: grid;
            grid-template-columns: minmax(330px, 372px) minmax(0, 1fr);
            grid-template-rows: minmax(0, 1fr) clamp(150px, 22vh, 196px);
            grid-template-areas: "waiting projects" "waiting claude";
            gap: 14px; padding: 14px;
        }
        .area-waiting  { grid-area: waiting; }
        .area-projects { grid-area: projects; }
        .area-claude   { grid-area: claude; }

        .panel { background: var(--panel-bg); border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; min-height: 0; color: var(--text); }
        .panel-header {
            flex: 0 0 auto; padding: 12px 16px; font-size: 12px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; color: var(--neutral);
            border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .panel-header .ph-title { display: flex; align-items: center; gap: 8px; }
        .panel-scroll { flex: 1 1 auto; min-height: 0; overflow: auto; }
        .count-chip { background: var(--header-bg); color: var(--accent); border-radius: 999px; padding: 2px 9px; font-size: 11px; font-weight: 800; }

        button { cursor: pointer; border: none; border-radius: 999px; padding: 9px 15px; font-weight: 700; font-size: 13px; font-family: inherit; transition: transform .08s ease, filter .15s ease, background .15s ease; }
        button:active { transform: translateY(1px); }
        .primary { background: var(--accent); color: #4a3216; }
        .primary:hover { filter: brightness(1.05); }
        .ghost { background: #eef3f8; color: var(--neutral); }
        .ghost:hover { background: #e3ebf3; }
        button[disabled] { opacity: .5; cursor: not-allowed; }
        .icon-btn { background: transparent; border: none; cursor: pointer; padding: 4px 7px; border-radius: 8px; font-size: 14px; color: var(--neutral); line-height: 1; }
        .icon-btn:hover { background: #eef3f8; color: var(--text); }

        /* ---------------- Waiting-on-You rail ---------------- */
        .wait-list { display: flex; flex-direction: column; }
        .wait-item { padding: 13px 15px; border-bottom: 1px solid var(--border); }
        .wait-item:last-child { border-bottom: none; }
        .wait-top { display: flex; align-items: center; gap: 9px; }
        .pri-dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; box-shadow: 0 0 0 3px rgba(0,0,0,.04); }
        .pri-high { background: var(--pri-high); } .pri-med { background: var(--pri-med); } .pri-low { background: var(--pri-low); }
        .wait-proj { font-weight: 800; font-size: 13.5px; color: var(--text); flex: 1 1 auto; min-width: 0; }
        .wait-tag { font-size: 10px; font-weight: 800; letter-spacing: .4px; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; }
        .wait-do { list-style: none; margin: 8px 0 0; padding: 0; display: flex; flex-direction: column; gap: 5px; }
        .wait-do li { display: flex; gap: 7px; font-size: 12.5px; color: var(--text-sub); align-items: flex-start; }
        .wait-do li::before { content: "▸"; color: var(--accent-deep); font-weight: 800; flex: 0 0 auto; }
        .wait-note { font-size: 11.5px; color: var(--st-wait); font-weight: 700; margin-top: 6px; }
        .wait-actions { display: flex; gap: 8px; margin-top: 11px; flex-wrap: wrap; }
        .wait-actions a, .wait-actions button { font-size: 12px; padding: 7px 13px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; }
        .link-btn { background: var(--accent); color: #4a3216; font-weight: 700; }
        .link-btn:hover { filter: brightness(1.05); }
        .detail-btn { background: #eef3f8; color: var(--neutral); font-weight: 700; }
        .detail-btn:hover { background: #e3ebf3; }

        /* ---------------- Projects grid ---------------- */
        .pulse { display: flex; gap: 6px; flex-wrap: wrap; }
        .pulse-chip { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--border); background: #fff; color: var(--neutral); border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 800; cursor: pointer; font-family: inherit; letter-spacing: .2px; }
        .pulse-chip:hover { background: #f5f8fc; }
        .pulse-chip.on { background: var(--header-bg); color: #fff; border-color: var(--header-bg); }
        .pulse-chip .pc-dot { width: 8px; height: 8px; border-radius: 50%; }
        .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(212px, 1fr)); gap: 12px; padding: 14px; }
        .proj-card {
            border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px 12px; background: #fff;
            display: flex; flex-direction: column; gap: 9px; position: relative; overflow: hidden;
            border-left: 4px solid var(--st-back); transition: box-shadow .15s ease, transform .08s ease;
        }
        .proj-card:hover { box-shadow: 0 8px 22px rgba(16,42,67,.12); }
        .proj-card.s-live { border-left-color: var(--st-live); } .proj-card.s-prog { border-left-color: var(--st-prog); }
        .proj-card.s-wait { border-left-color: var(--st-wait); } .proj-card.s-back { border-left-color: var(--st-back); }
        .pc-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
        .pc-name { font-weight: 800; font-size: 13.5px; color: var(--text); line-height: 1.25; }
        .pc-cat { font-size: 10.5px; color: var(--text-sub); font-weight: 600; }
        .status-pill { padding: 4px 10px; border-radius: 999px; font-size: 10.5px; font-weight: 800; cursor: pointer; border: none; letter-spacing: .3px; text-transform: uppercase; white-space: nowrap; font-family: inherit; }
        .sp-live { background: var(--st-live-bg); color: var(--st-live); } .sp-prog { background: var(--st-prog-bg); color: var(--st-prog); }
        .sp-wait { background: var(--st-wait-bg); color: var(--st-wait); } .sp-back { background: var(--st-back-bg); color: var(--st-back); }
        .pc-next { font-size: 12px; color: var(--text-sub); flex: 1 1 auto; }
        .pc-next b { color: var(--st-wait); }
        .pc-actions { display: flex; gap: 7px; margin-top: 2px; }
        .pc-actions a, .pc-actions button { flex: 1; text-align: center; font-size: 12px; padding: 8px 6px; border-radius: 9px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
        .pc-open { background: var(--header-bg); color: #fff; font-weight: 700; }
        .pc-open:hover { background: #16344c; }
        .pc-open.disabled { background: #eef2f7; color: #9aa7b6; pointer-events: none; }
        .pc-details { background: #eef3f8; color: var(--neutral); font-weight: 700; }
        .pc-details:hover { background: #e3ebf3; }
        .pc-kit { flex: 0 0 auto; }

        /* ---------------- Message Claude composer ---------------- */
        .claude-body { display: flex; flex-direction: column; gap: 8px; padding: 12px 14px; flex: 1 1 auto; min-height: 0; }
        .claude-row { display: flex; gap: 8px; align-items: stretch; flex: 1 1 auto; min-height: 0; }
        #claudeInput { flex: 1 1 auto; resize: none; border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; font-family: inherit; font-size: 13.5px; color: var(--text); min-height: 0; }
        #claudeInput:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
        .claude-side { display: flex; flex-direction: column; gap: 7px; width: 168px; flex: 0 0 auto; }
        .claude-side select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 12.5px; color: var(--text); background: #fff; }
        .claude-btns { display: flex; gap: 7px; }
        .claude-btns button { flex: 1; padding: 9px 6px; }
        .claude-note { font-size: 11px; color: var(--neutral); display: flex; align-items: center; gap: 6px; }
        .claude-note b { color: var(--st-wait); }

        /* ---------------- Modal ---------------- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(8,18,28,.62); backdrop-filter: blur(2px); display: none; align-items: center; justify-content: center; z-index: 80; padding: 16px; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 20px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,.4); color: var(--text); }
        .modal.wide { max-width: 800px; }
        .modal-head { padding: 20px 24px 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .modal-head h2 { margin: 0; font-size: 20px; }
        .modal-body { padding: 8px 24px 22px; }
        .modal-foot { padding: 0 24px 24px; display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 6px; color: var(--neutral); }
        .field input, .field select, .field textarea { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; color: var(--text); background: #fff; }
        .field textarea { resize: vertical; min-height: 88px; line-height: 1.5; }
        .field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
        .switch-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .switch-row:last-child { border-bottom: none; }

        /* project detail modal */
        .pd-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
        .pd-link { font-size: 12.5px; color: var(--st-prog); font-weight: 700; word-break: break-all; }
        .ship-label { font-size: 11px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; color: var(--neutral); margin: 6px 0 8px; }
        .ship-list { list-style: none; padding: 0; margin: 0 0 12px; display: flex; flex-direction: column; gap: 4px; }
        .ship-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 10px; }
        .ship-item.done { background: #f3f8f4; }
        .ship-item input[type=checkbox] { width: 18px; height: 18px; flex: 0 0 auto; }
        .ship-item .ship-text { flex: 1 1 auto; font-size: 13px; color: var(--text); }
        .ship-item.done .ship-text { text-decoration: line-through; color: var(--neutral); }
        .ship-add { display: flex; gap: 8px; }
        .ship-add input { flex: 1; padding: 9px 12px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 13px; }

        /* about / forge */
        .about-box { margin-top: 8px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; background: #f8fafd; text-align: center; }
        .about-box .logo-badge { margin-bottom: 10px; box-shadow: none; }
        .about-box .copy { font-size: 12px; color: var(--neutral); font-weight: 600; }
        .about-box .copy .tm { color: var(--accent-deep); font-weight: 800; }
        .warn-box { border: 1px solid #f0c9a0; background: #fff7ee; color: #7a4a1e; border-radius: 12px; padding: 12px 14px; font-size: 12.5px; line-height: 1.5; margin-bottom: 14px; }
        .warn-box strong { color: #5a3d1e; }
        .forge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .forge-grid .field { margin-bottom: 0; }
        .forge-label { font-size: 11px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; color: var(--neutral); margin: 16px 0 6px; }
        .forge-out { width: 100%; min-height: 140px; padding: 13px 15px; border: 1px solid var(--border); border-radius: 10px; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12.5px; line-height: 1.55; color: var(--text); background: #f8fafd; resize: vertical; white-space: pre-wrap; }
        .forge-out:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
        .forge-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 11px 0; }
        .token-badge { display: inline-flex; align-items: center; gap: 6px; background: #eef3f8; color: var(--neutral); font-weight: 800; font-size: 12px; padding: 5px 12px; border-radius: 999px; }
        .token-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-deep); }
        .forge-level { font-size: 12px; font-weight: 700; color: var(--neutral); }
        .forge-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .forge-note { font-size: 12px; color: var(--neutral); margin: 6px 0 0; }
        .forge-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 2px; }
        .chip { border: 1px solid var(--border); background: #fff; color: var(--neutral); border-radius: 999px; padding: 7px 13px; font-size: 12.5px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .chip:hover { background: #eef3f8; color: var(--text); }

        /* toasts */
        .toast-stack { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 90; max-width: 330px; }
        .toast { background: #14283b; color: #fff; padding: 13px 16px; border-radius: 12px; font-size: 13px; box-shadow: 0 10px 30px rgba(0,0,0,.35); animation: slidein .25s ease; }
        .toast.success { background: #2f8f5b; } .toast.urgent { background: #c94642; }
        @keyframes slidein { from { transform: translateY(12px); opacity: 0; } to { transform: none; opacity: 1; } }

        .empty-state { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; padding: 30px 16px; color: var(--neutral); }
        .empty-state .em-emoji { font-size: 26px; }

        /* ---------------- Mobile ---------------- */
        @media (max-width: 980px) {
            body { overflow: auto; height: auto; min-height: 100vh; }
            .workspace { display: flex; flex-direction: column; gap: 12px; padding: 12px; }
            .area-waiting .panel-scroll { max-height: 46vh; }
            .area-projects .panel-scroll { max-height: none; }
            .area-claude { min-height: 220px; }
            .claude-row { flex-direction: column; }
            .claude-side { width: 100%; flex-direction: row; flex-wrap: wrap; }
            .claude-side select { flex: 1 1 140px; } .claude-side button { flex: 1 1 120px; width: auto; }
            #claudeInput { min-height: 80px; }
        }
        @media (max-width: 600px) {
            .user-meta, .brand-divider, .brand-sub { display: none; }
            .forge-grid { grid-template-columns: 1fr; }
            .proj-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 420px) { .proj-grid { grid-template-columns: 1fr; } }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
    </style>
</head>
<body>
    <a class="skip-link" href="#waiting">Skip to what's waiting on you</a>

    <!-- HEADER (dark) — J8NIX gold wordmark; 3Shamrocks on a white badge -->
    <header>
        <div class="brand">
            <img src="J8NIX_notag.png" alt="J8NIX" class="logo" onerror="this.onerror=null;this.src='J8NIX_LOGO.png'">
            <span class="tm" aria-hidden="true">™</span>
            <span class="brand-sub">Command Center</span>
            <span class="brand-divider" aria-hidden="true"></span>
            <span class="user-chip">
                <span class="logo-badge"><img src="3shamrocks_black.png" alt="3Shamrocks Studio" height="20" onerror="this.parentNode.style.display='none'"></span>
                <span class="user-meta">
                    <span class="nm" id="userName">Dave Markovich</span>
                    <span class="sub" id="userOrg">3Shamrocks Studio</span>
                </span>
            </span>
        </div>
        <div class="header-right">
            <span class="badge"><span class="dot"></span><span id="clockLabel">—</span></span>
            <button class="hdr-btn" id="briefBtn" title="Hear what's waiting on you">🔊 Brief</button>
            <button class="hdr-btn gold" id="forgeBtn" title="Prompt Forge — engineer a tight AI prompt">🔥 Prompt Forge</button>
            <button class="hdr-btn" id="helpBtn" aria-haspopup="dialog">❔ Help</button>
            <button class="hdr-btn" id="settingsBtn" aria-haspopup="dialog">⚙ Settings</button>
        </div>
    </header>

    <main class="workspace">
        <!-- LEFT RAIL: Waiting on You (priority) -->
        <section class="panel area-waiting" id="waiting" aria-label="Waiting on you">
            <div class="panel-header">
                <span class="ph-title">⏳ Waiting on You <span class="count-chip" id="waitCount">0</span></span>
                <button class="icon-btn" id="addWaitBtn" title="Add a waiting item" aria-label="Add a waiting item">＋</button>
            </div>
            <div class="panel-scroll"><div class="wait-list" id="waitList"></div></div>
        </section>

        <!-- TOP-RIGHT: Projects grid -->
        <section class="panel area-projects" aria-label="Projects">
            <div class="panel-header">
                <span class="ph-title">🗂 Projects</span>
                <span class="pulse" id="pulse" role="tablist" aria-label="Filter projects by status"></span>
            </div>

    <!-- Modal -->

            <div class="modal-foot" id="modalFoot"></div>

    </div>

    <div class="toast-stack" id="toastStack" aria-live="assertive"></div>

    <script>
    "use strict";
    (function () {
        /* ---------- shared-origin hygiene: clear stray SWs / foreign caches ---------- */
        if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(function (r) { r.forEach(function (x) { x.unregister(); }); }).catch(function(){}); }
        if (window.caches && caches.keys) { caches.keys().then(function (k) { k.forEach(function (n) { if (!/^j8nix-own/.test(n)) caches.delete(n); }); }).catch(function(){}); }

        var VERSION = '2.0.0';
        var STORE_KEY = 'j8nix_cc_v2';
        var BASE = 'https://3shamrocksstudio.github.io/';
        var $ = function (s, r) { return (r || document).querySelector(s); };

        /* ---------- Status model ---------- */
        var STATUS = {
            live: { label: 'Live',        cls: 'live', dot: '🟢' },

            back: { label: 'Backlog',     cls: 'back', dot: '⚪' }
        };
        var STATUS_ORDER = ['live', 'prog', 'wait', 'back'];

        /* ---------- Real 3Shamrocks Studio data (seed; editable + persisted) ----------
           Every `url` here was verified to return HTTP 200. Items without a public URL
           omit the link rather than fabricate one. */
        function defaultState() {
            return {
                settings: { userName: 'Dave Markovich', org: '3Shamrocks Studio', voiceEnabled: true, voiceName: '', aiProvider: 'anthropic', apiModel: '', apiKey: '', ttsKey: '', ttsVoiceId: '' },
                projects: [
                    { key: 'th-mvp',   name: 'Trashure-Hunters · MVP', cat: 'App build', status: 'wait', url: BASE + 'th-website/',
                      ship: [ { t: 'Regenerate Anthropic API key', done: false }, { t: 'Add Firebase credentials', done: false }, { t: 'Re-test end to end', done: false } ] },
                    { key: 'ig-network', name: 'IG Network', cat: 'Media · social', status: 'wait', url: BASE + 'media-network-hub/kit.html',
                      ship: [ { t: 'Finalize the 4 account names (paused here)', done: false }, { t: 'Create the 4 Instagram accounts', done: false } ] },
                    { key: 'th-movie', name: 'Trashure-Hunters · Movie', cat: 'Media · script', status: 'wait', url: '',
                      ship: [ { t: 'Decide script length — ~55 min vs ~90 min', done: false } ] },
                    { key: 'cosmix',   name: 'Cosmix', cat: 'Brand · creative', status: 'wait', url: '',
                      ship: [ { t: 'Pick creative direction — option A or option C', done: false } ] },
                    { key: 'shomer-forest', name: 'SHOMER · Forest', cat: 'Live experience', status: 'live', url: BASE + 'shomer-forest/',
                      ship: [ { t: 'Review the live build end to end', done: false }, { t: 'Check controls + audio on mobile', done: false } ] },
                    { key: 'shomer-beach',  name: 'SHOMER · Beach', cat: 'Live experience', status: 'live', url: BASE + 'shomer-beach/',
                      ship: [ { t: 'Test the live build', done: false } ] },
                    { key: 'milo-app',  name: 'Milo', cat: 'App', status: 'live', url: BASE + 'milo-app/',
                      ship: [ { t: 'Test live flow', done: false }, { t: 'Review copy', done: false } ] },
                    { key: 'chore-wars', name: 'Chore Wars', cat: 'App', status: 'live', url: BASE + 'chore-wars/',
                      ship: [ { t: 'Test the live flow', done: false } ] },
                    { key: 'senior-helper', name: 'Senior Helper', cat: 'App', status: 'live', url: BASE + 'senior-helper/',
                      ship: [ { t: 'Test live', done: false }, { t: 'Accessibility pass', done: false } ] },
                    { key: 'th-website', name: 'Trashure-Hunters · Site', cat: 'Website', status: 'live', url: BASE + 'th-website/',
                      ship: [ { t: 'Review the live site', done: false } ] },
                    { key: '3s-design-system', name: '3S Design System', cat: 'System', status: 'live', url: BASE + '3s-design-system/',
                      ship: [ { t: 'Review tokens + components', done: false } ] },
                    { key: 'media-network-hub', name: 'Media Network Hub', cat: 'Media · hub', status: 'live', url: BASE + 'media-network-hub/', kit: BASE + 'media-network-hub/kit.html',
                      ship: [ { t: 'Review the hub', done: false }, { t: 'Open the brand kit', done: false } ] },
                    { key: 'gumroad', name: 'Gumroad Product', cat: 'Product · store', status: 'live', url: 'https://markodave.gumroad.com/l/ruaqk',
                      ship: [ { t: 'Review the live listing', done: false } ] }
                ],
                /* Waiting-on-You panel — ordered by priority. `pk` links to a project card.
                   `link` is the exact thing to open (only set when a real URL exists). */
                waiting: [
                    { id: 'w1', pk: 'ig-network', proj: 'IG Network', pri: 'high', note: 'Paused on final account names',
                      doing: ['Finalize the 4 account names', 'Create the 4 Instagram accounts'], link: { label: 'Open brand kit', url: BASE + 'media-network-hub/kit.html' } },
                    { id: 'w2', pk: 'th-mvp', proj: 'Trashure-Hunters · MVP', pri: 'high', note: '',
                      doing: ['Regenerate Anthropic API key', 'Add Firebase credentials', 'Re-test end to end'], link: { label: 'Open live site', url: BASE + 'th-website/' } },
                    { id: 'w3', pk: 'th-movie', proj: 'Trashure-Hunters · Movie', pri: 'med', note: '',
                      doing: ['Decide script length — ~55 min vs ~90 min'], link: null },
                    { id: 'w4', pk: 'cosmix', proj: 'Cosmix', pri: 'med', note: '',
                      doing: ['Pick creative direction — option A or option C'], link: null },
                    { id: 'w5', pk: '', proj: 'Live products', pri: 'low', note: 'When you have a window',
                      doing: ['Review & test each deployed product (green cards →)'], link: null }
                ]
            };
        }

        var state;
        try {
            state = JSON.parse(localStorage.getItem(STORE_KEY)) || defaultState();
            if (!state.projects || !state.settings || !state.waiting) state = defaultState();
            var ds = defaultState().settings;
            for (var k in ds) { if (!(k in state.settings)) state.settings[k] = ds[k]; }
        } catch (e) { state = defaultState(); }

        var saveTimer;
        function save() { clearTimeout(saveTimer); saveTimer = setTimeout(function () { try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) { toast('Could not save (storage blocked).', 'urgent'); } }, 120); }

        /* ---------- Toasts ---------- */
        function toast(msg, kind) {
            var t = document.createElement('div'); t.className = 'toast' + (kind ? ' ' + kind : ''); t.textContent = msg;
            $('#toastStack').appendChild(t);
            setTimeout(function () { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; }, 3200);
            setTimeout(function () { t.remove(); }, 3600);
        }

        /* ---------- Small DOM helpers ---------- */
        function el(tag, cls, text) { var n = document.createElement(tag); if (cls) n.className = cls; if (text != null) n.textContent = text; return n; }
        function btn(label, cls, onClick) { var b = el('button', cls, label); b.addEventListener('click', onClick); return b; }
        function projByKey(key) { return state.projects.find(function (p) { return p.key === key; }); }

        /* ---------- Projects grid ---------- */
        var filter = 'all';
        function statusCounts() { var c = { live: 0, prog: 0, wait: 0, back: 0 }; state.projects.forEach(function (p) { c[p.status] = (c[p.status] || 0) + 1; }); return c; }
        function renderPulse() {
            var c = statusCounts(), wrap = $('#pulse'); wrap.textContent = '';
            function chip(key, label, dotColor, count) {
                var b = el('button', 'pulse-chip' + (filter === key ? ' on' : '')); b.type = 'button'; b.setAttribute('role', 'tab'); b.setAttribute('aria-selected', filter === key);
                if (dotColor) { var d = el('span', 'pc-dot'); d.style.background = dotColor; b.appendChild(d); }
                b.appendChild(document.createTextNode(label + ' ' + count));
                b.addEventListener('click', function () { filter = key; renderPulse(); renderProjects(); });
                wrap.appendChild(b);
            }
            chip('all', 'All', '', state.projects.length);
            chip('live', 'Live', 'var(--st-live)', c.live);
            chip('prog', 'In progress', 'var(--st-prog)', c.prog);
            chip('wait', 'Waiting', 'var(--st-wait)', c.wait);
            chip('back', 'Backlog', 'var(--st-back)', c.back);
        }
        function makeStatusPill(p) {
            var s = STATUS[p.status]; var b = el('button', 'status-pill sp-' + s.cls, s.label); b.type = 'button';
            b.setAttribute('aria-label', 'Status: ' + s.label + '. Click to change.');
            b.addEventListener('click', function (e) {
                e.stopPropagation();
                var i = STATUS_ORDER.indexOf(p.status); p.status = STATUS_ORDER[(i + 1) % STATUS_ORDER.length];
                save(); renderProjects(); renderPulse(); syncWaitingWithStatus(p);
                toast(p.name + ' → ' + STATUS[p.status].label);
            });
            return b;
        }
        function nextActionText(p) {
            var open = p.ship.filter(function (x) { return !x.done; });
            if (!open.length) return p.status === 'live' ? 'Deployed — all checks done.' : 'No open actions.';
            return open[0].t + (open.length > 1 ? ' · +' + (open.length - 1) + ' more' : '');
        }
        function renderProjects() {
            var grid = $('#projGrid'); grid.textContent = '';
            var list = state.projects.filter(function (p) { return filter === 'all' || p.status === filter; });
            if (!list.length) {
                var es = el('div', 'empty-state'); es.appendChild(el('div', 'em-emoji', '🗂'));
                es.appendChild(el('div', null, 'No projects in this view.')); grid.appendChild(es); return;
            }
            list.forEach(function (p) {
                var s = STATUS[p.status];
                var card = el('div', 'proj-card s-' + s.cls);
                var head = el('div', 'pc-head');
                var nameWrap = el('div'); nameWrap.appendChild(el('div', 'pc-name', p.name)); nameWrap.appendChild(el('div', 'pc-cat', p.cat));
                head.appendChild(nameWrap); head.appendChild(makeStatusPill(p)); card.appendChild(head);

                var next = el('div', 'pc-next');
                if (p.status === 'wait') { next.appendChild(el('b', null, 'Needs you: ')); next.appendChild(document.createTextNode(nextActionText(p))); }
                else next.textContent = nextActionText(p);
                card.appendChild(next);

                var actions = el('div', 'pc-actions');
                if (p.url) {
                    var open = el('a', 'pc-open'); open.href = p.url; open.target = '_blank'; open.rel = 'noopener noreferrer';
                    open.appendChild(document.createTextNode((p.status === 'live' ? 'Open' : 'Test') + ' ↗')); open.title = p.url;
                    open.addEventListener('click', function (e) { e.stopPropagation(); }); actions.appendChild(open);
                } else {
                    var na = el('span', 'pc-open disabled', 'No live URL'); actions.appendChild(na);
                }
                if (p.kit) {
                    var kit = el('a', 'pc-open pc-kit'); kit.href = p.kit; kit.target = '_blank'; kit.rel = 'noopener noreferrer'; kit.textContent = 'Kit ↗'; kit.title = p.kit;
                    kit.addEventListener('click', function (e) { e.stopPropagation(); }); actions.appendChild(kit);
                }
                var det = el('button', 'pc-details', 'Details'); det.addEventListener('click', function (e) { e.stopPropagation(); openProject(p.key); }); actions.appendChild(det);
                card.appendChild(actions);

                card.style.cursor = 'pointer';
                card.addEventListener('click', function () { openProject(p.key); });
                grid.appendChild(card);
            });
        }
        // If a project is no longer "waiting", drop its auto waiting-panel item; if it becomes waiting, ensure one exists.
        function syncWaitingWithStatus(p) {
            var item = state.waiting.find(function (w) { return w.pk === p.key; });
            if (p.status === 'wait' && !item) {
                var open = p.ship.filter(function (x) { return !x.done; }).map(function (x) { return x.t; });
                state.waiting.push({ id: 'w_' + p.key, pk: p.key, proj: p.name, pri: 'med', note: '', doing: open.length ? open : ['Define what it needs'], link: p.url ? { label: 'Open', url: p.url } : null });
            } else if (p.status !== 'wait' && item && /^w_/.test(item.id)) {
                state.waiting = state.waiting.filter(function (w) { return w !== item; });
            }
            save(); renderWaiting();
        }

        /* ---------- Waiting-on-You rail ---------- */
        function renderWaiting() {
            var list = $('#waitList'); list.textContent = '';
            var order = { high: 0, med: 1, low: 2 };
            var items = state.waiting.slice().sort(function (a, b) { return order[a.pri] - order[b.pri]; });
            $('#waitCount').textContent = items.length;
            if (!items.length) {
                var es = el('div', 'empty-state'); es.appendChild(el('div', 'em-emoji', '✅'));
                es.appendChild(el('div', null, 'Nothing is waiting on you. Clean board.')); list.appendChild(es); return;
            }
            items.forEach(function (w) {
                var row = el('div', 'wait-item');
                var top = el('div', 'wait-top');
                var dot = el('span', 'pri-dot pri-' + w.pri); dot.title = w.pri + ' priority'; dot.setAttribute('aria-label', w.pri + ' priority'); top.appendChild(dot);
                top.appendChild(el('span', 'wait-proj', w.proj));
                var pk = projByKey(w.pk);
                if (pk) { var tag = el('span', 'wait-tag sp-' + STATUS[pk.status].cls, STATUS[pk.status].label); top.appendChild(tag); }
                row.appendChild(top);

                var ul = el('ul', 'wait-do'); (w.doing || []).forEach(function (d) { ul.appendChild(el('li', null, d)); }); row.appendChild(ul);
                if (w.note) row.appendChild(el('div', 'wait-note', '⏸ ' + w.note));

                var acts = el('div', 'wait-actions');
                if (w.link && w.link.url) {
                    var a = el('a', 'link-btn'); a.href = w.link.url; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.title = w.link.url;
                    a.appendChild(document.createTextNode(w.link.label + ' ↗')); acts.appendChild(a);
                }
                if (w.pk) { var d = el('button', 'detail-btn', 'Open project'); d.addEventListener('click', function () { openProject(w.pk); }); acts.appendChild(d); }
                else if (w.proj === 'Live products') { var lv = el('button', 'detail-btn', 'Show live →'); lv.addEventListener('click', function () { filter = 'live'; renderPulse(); renderProjects(); $('#projGrid').scrollIntoView({ block: 'nearest' }); }); acts.appendChild(lv); }
                var del = el('button', 'detail-btn', '✕'); del.title = 'Remove from waiting'; del.setAttribute('aria-label', 'Remove ' + w.proj + ' from waiting');
                del.addEventListener('click', function () { state.waiting = state.waiting.filter(function (x) { return x !== w; }); save(); renderWaiting(); toast('Removed from waiting.'); });
                acts.appendChild(del);
                row.appendChild(acts);
                list.appendChild(row);
            });
        }
        function addWaiting() {
            var proj = prompt('What project is waiting on you?'); if (!proj) return;
            var todo = prompt('What do you need to do? (one line)') || 'Decide next step';
            state.waiting.push({ id: 'w_' + Date.now(), pk: '', proj: proj.trim(), pri: 'med', note: '', doing: [todo.trim()], link: null });
            save(); renderWaiting(); toast('Added to waiting.', 'success');
        }

        /* ---------- Modal core (focus-trapped) ---------- */
        var modal = $('#modalOverlay'), lastFocus = null;
        function openModal(title, bodyNodes, footNodes, wide) {
            $('#modalTitle').textContent = title;
            var body = $('#modalBody'); body.textContent = ''; bodyNodes.forEach(function (n) { body.appendChild(n); });
            var foot = $('#modalFoot'); foot.textContent = ''; footNodes.forEach(function (n) { foot.appendChild(n); });
            var inner = modal.querySelector('.modal'); if (inner) inner.classList.toggle('wide', !!wide);
            lastFocus = document.activeElement; modal.classList.add('open');
            var f = modal.querySelector('button, input, select, textarea'); if (f) f.focus();
        }
        function closeModal() { modal.classList.remove('open'); var inner = modal.querySelector('.modal'); if (inner) inner.classList.remove('wide'); if (lastFocus && document.contains(lastFocus)) lastFocus.focus(); }
        modal.addEventListener('keydown', function (e) {
            if (e.key !== 'Tab' || !modal.classList.contains('open')) return;
            var f = modal.querySelectorAll('button, input, select, textarea, [tabindex]:not([tabindex="-1"])'); if (!f.length) return;
            var first = f[0], last = f[f.length - 1];
            if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
            else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
        });
        $('#modalClose').addEventListener('click', closeModal);
        modal.addEventListener('click', function (e) { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

        function field(labelText, inputEl) {
            var wrap = el('div', 'field'); var lbl = el('label', null, labelText);
            var id = 'f_' + Math.abs(labelText.split('').reduce(function (a, c) { return a * 31 + c.charCodeAt(0) | 0; }, 7));
            lbl.setAttribute('for', id); inputEl.id = id; wrap.appendChild(lbl); wrap.appendChild(inputEl); return wrap;
        }
        function toggleRow(labelText, checked, onChange) {
            var row = el('div', 'switch-row'); var span = el('span', null, labelText); span.style.fontWeight = '600';
            var cb = el('input'); cb.type = 'checkbox'; cb.checked = !!checked; cb.style.width = '20px'; cb.style.height = '20px';
            cb.addEventListener('change', function () { onChange(cb.checked); }); row.appendChild(span); row.appendChild(cb); return row;
        }
        function aboutBox() {
            var box = el('div', 'about-box'); var badge = el('span', 'logo-badge');
            var logo = el('img'); logo.src = '3shamrocks_black.png'; logo.alt = '3Shamrocks Studio'; logo.height = 24; logo.onerror = function () { badge.style.display = 'none'; }; badge.appendChild(logo);
            var copy = el('div', 'copy'); copy.appendChild(document.createTextNode('© 2026 3Shamrocks Studio. All rights reserved.')); copy.appendChild(el('br'));
            var prod = el('span'); prod.appendChild(document.createTextNode('J8NIX')); var tm = el('span', 'tm', '™'); prod.appendChild(tm);
            prod.appendChild(document.createTextNode(' v' + VERSION + ' — Command Center.')); copy.appendChild(prod);
            box.appendChild(badge); box.appendChild(copy); return box;
        }

        /* ---------- Project detail modal ---------- */
        function openProject(key) {
            var p = projByKey(key); if (!p) return;
            var meta = el('div', 'pd-meta');
            meta.appendChild(makeStatusPill(p));
            meta.appendChild(el('span', null, p.cat));
            var body = [meta];

            if (p.url) { var lk = el('div'); var a = el('a', 'pd-link'); a.href = p.url; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.textContent = p.url; lk.appendChild(a); body.push(lk); }
            else { body.push(el('div', 'forge-note', 'No public URL yet — this one ships before it has a live link.')); }

            body.push(el('div', 'ship-label', 'What it takes to ship'));
            var ul = el('ul', 'ship-list'); body.push(ul);
            function paintShip() {
                ul.textContent = '';
                if (!p.ship.length) { ul.appendChild(el('div', 'forge-note', 'No tasks yet — add the first one below.')); return; }
                p.ship.forEach(function (item, i) {
                    var li = el('li', 'ship-item' + (item.done ? ' done' : ''));
                    var cb = el('input'); cb.type = 'checkbox'; cb.checked = item.done; cb.setAttribute('aria-label', item.t);
                    cb.addEventListener('change', function () { item.done = cb.checked; save(); li.classList.toggle('done', item.done); renderProjects(); });
                    var tx = el('span', 'ship-text', item.t);
                    var rm = el('button', 'icon-btn', '🗑'); rm.title = 'Remove'; rm.setAttribute('aria-label', 'Remove task'); rm.addEventListener('click', function () { p.ship.splice(i, 1); save(); paintShip(); renderProjects(); });
                    li.appendChild(cb); li.appendChild(tx); li.appendChild(rm); ul.appendChild(li);
                });
            }
            paintShip();
            var addWrap = el('div', 'ship-add'); var addIn = el('input'); addIn.type = 'text'; addIn.placeholder = 'Add a step to ship…';
            var addBtn = btn('Add', 'ghost', function () { var v = addIn.value.trim(); if (!v) return; p.ship.push({ t: v, done: false }); addIn.value = ''; save(); paintShip(); renderProjects(); addIn.focus(); });
            addIn.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); } });
            addWrap.appendChild(addIn); addWrap.appendChild(addBtn); body.push(addWrap);

            var foot = [];
            if (p.url) { var open = btn((p.status === 'live' ? '🔗 Open live ↗' : '🧪 Test live ↗'), 'primary', function () { window.open(p.url, '_blank', 'noopener'); }); foot.push(open); }
            if (p.kit) { foot.push(btn('🎨 Brand kit ↗', 'ghost', function () { window.open(p.kit, '_blank', 'noopener'); })); }
            foot.push(btn('Ask Claude about this', 'ghost', function () { closeModal(); $('#claudeCtx').value = p.name; $('#claudeInput').value = 'Re: ' + p.name + ' — '; $('#claudeInput').focus(); }));
            foot.push(btn('Close', 'ghost', closeModal));
            openModal(p.name, body, foot);
        }

        /* ---------- Message Claude composer (honest: copy-to-paste only) ---------- */
        function fillCtx() {
            var sel = $('#claudeCtx'); sel.textContent = ''; sel.appendChild(new Option('No project context', ''));
            state.projects.forEach(function (p) { sel.appendChild(new Option(p.name, p.name)); });
        }
        function copyText(text, okMsg) {
            function fallback() { try { var ta = el('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); ta.remove(); toast(okMsg || 'Copied.', 'success'); } catch (e) { toast('Copy failed — select and copy manually.', 'urgent'); } }
            if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(function () { toast(okMsg || 'Copied.', 'success'); }, fallback); else fallback();
        }
        function copyClaude() {
            var msg = $('#claudeInput').value.trim();
            if (!msg) { toast('Type a command first.', 'urgent'); $('#claudeInput').focus(); return; }
            var ctx = $('#claudeCtx').value;
            var header = '[J8NIX → Claude' + (ctx ? ' · ' + ctx : '') + ']';
            copyText(header + '\n' + msg, 'Command copied — paste it to Claude in chat.');
        }

        /* ---------- Help ---------- */
        function openHelp() {
            var lead = el('p'); lead.style.fontSize = '14px';
            lead.textContent = 'J8NIX is your 3Shamrocks Studio command center — one place to see every project, its status, and exactly what is waiting on you. Everything is clickable and actionable.';
            var ul = el('ul'); ul.style.cssText = 'list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:10px;';
            [['⏳', 'Waiting on You', 'Your priority queue. Each item shows what to do and links straight to the thing to review, test or decide. Highest priority on top.'],
             ['🗂', 'Projects', 'Every project as a card with a live status pill (click to cycle) and a working Open / Test button to the real URL. Filter by status with the chips.'],
             ['📋', 'Project details', 'Click a card to see its ship checklist — tick items off as you go. Add or remove steps; everything saves locally.'],
             ['💬', 'Message Claude', 'Type a command and hit Copy. It formats a ready-to-paste message for Claude in chat. Honest: it does NOT send to a live AI — that bridge needs a backend (future phase).'],
             ['🔥', 'Prompt Forge', 'Turn plain words into a tight, token-efficient AI prompt. Works fully offline.']
            ].forEach(function (p) { var li = el('li'); li.style.cssText = 'display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--text-sub)'; var s = el('span', null, p[0]); s.style.fontSize = '16px'; var t = el('span'); var b = el('strong', null, p[1] + ' — '); b.style.color = 'var(--text)'; t.appendChild(b); t.appendChild(document.createTextNode(p[2])); li.appendChild(s); li.appendChild(t); ul.appendChild(li); });
            var note = el('p', 'forge-note'); note.textContent = 'What’s real: every status, checklist and link works now and persists in your browser. What’s a future phase: a live AI bridge (Message Claude sending automatically) needs a backend — see README.';
            openHelp.last = openModal('What is J8NIX?', [lead, ul, note, aboutBox()], [btn('Close', 'primary', closeModal)]);
        }

        /* ---------- Settings ---------- */
        function applyIdentity() { $('#userName').textContent = state.settings.userName; $('#userOrg').textContent = state.settings.org; }
        function openSettings() {
            var nameIn = el('input'); nameIn.type = 'text'; nameIn.value = state.settings.userName;
            var orgIn = el('input'); orgIn.type = 'text'; orgIn.value = state.settings.org;
            var voiceSel = el('select');
            (function () { voiceSel.appendChild(new Option('Auto (warm voice)', '')); listVoices().forEach(function (v) { var o = new Option(v.name + ' (' + v.lang + ')', v.name); if (v.name === state.settings.voiceName) o.selected = true; voiceSel.appendChild(o); }); })();
            var voiceTest = btn('🔊 Test voice', 'ghost', function () { state.settings.voiceName = voiceSel.value; pickVoice(); speak('Hi Dave, this is J8NIX. Here is your command center.'); }); voiceTest.style.marginTop = '8px';

            var ttsHead = el('div', 'forge-label', 'Optional: premium neural voice');
            var ttsWarn = el('div', 'warn-box'); var tw = el('strong', null, '⚠ Built-in voices vary by device. '); ttsWarn.appendChild(tw);
            ttsWarn.appendChild(document.createTextNode('For a genuinely human voice, paste your own ElevenLabs key — stored only in this browser and exposed to page scripts, so use a limited key. Production-safe path is a backend proxy (README).'));
            var ttsKeyIn = el('input'); ttsKeyIn.type = 'password'; ttsKeyIn.autocomplete = 'off'; ttsKeyIn.value = state.settings.ttsKey || ''; ttsKeyIn.placeholder = 'ElevenLabs API key (optional)';
            var ttsVoiceIn = el('input'); ttsVoiceIn.type = 'text'; ttsVoiceIn.value = state.settings.ttsVoiceId || ''; ttsVoiceIn.placeholder = 'Voice ID (optional)';

            var aiHead = el('div', 'forge-label', 'Optional: live AI refine for Prompt Forge (advanced)');
            var warn = el('div', 'warn-box'); var wb = el('strong', null, '⚠ Client-side keys are insecure. '); warn.appendChild(wb);
            warn.appendChild(document.createTextNode('A key pasted here is stored only in this browser and exposed to any page script — never use a production key. Leave blank to keep Prompt Forge fully offline.'));
            var providerSel = el('select'); [['anthropic', 'Anthropic (Claude)'], ['openai', 'OpenAI']].forEach(function (o) { var op = new Option(o[1], o[0]); if (o[0] === (state.settings.aiProvider || 'anthropic')) op.selected = true; providerSel.appendChild(op); });
            var modelIn = el('input'); modelIn.type = 'text'; modelIn.value = state.settings.apiModel || ''; modelIn.placeholder = state.settings.aiProvider === 'openai' ? 'gpt-4o-mini' : 'claude-opus-4-8';
            var keyIn = el('input'); keyIn.type = 'password'; keyIn.autocomplete = 'off'; keyIn.value = state.settings.apiKey || ''; keyIn.placeholder = 'Your API key (local only)';
            providerSel.addEventListener('change', function () { modelIn.placeholder = providerSel.value === 'openai' ? 'gpt-4o-mini' : 'claude-opus-4-8'; });

            var body = [ field('Your name', nameIn), field('Organization', orgIn),
                toggleRow('Voice replies (text-to-speech)', state.settings.voiceEnabled, function (v) { state.settings.voiceEnabled = v; save(); }),
                field('Assistant voice', voiceSel), voiceTest, ttsHead, ttsWarn, field('ElevenLabs key (local only)', ttsKeyIn), field('Voice ID (optional)', ttsVoiceIn),
                aiHead, warn, field('AI provider', providerSel), field('Model (optional)', modelIn), field('API key (local only)', keyIn), aboutBox() ];
            var foot = [
                btn('Reset data', 'ghost', function () { if (confirm('Reset all projects, waiting items and settings to the seeded 3S defaults?')) { localStorage.removeItem(STORE_KEY); location.reload(); } }),
                btn('Save', 'primary', function () {
                    state.settings.userName = nameIn.value.trim() || 'Dave Markovich'; state.settings.org = orgIn.value.trim() || '3Shamrocks Studio';
                    state.settings.voiceName = voiceSel.value; state.settings.ttsKey = ttsKeyIn.value.trim(); state.settings.ttsVoiceId = ttsVoiceIn.value.trim();
                    state.settings.aiProvider = providerSel.value; state.settings.apiModel = modelIn.value.trim(); state.settings.apiKey = keyIn.value.trim();
                    pickVoice(); applyIdentity(); save(); closeModal(); toast('Settings saved.', 'success');
                })
            ];
            openModal('Settings', body, foot);
        }

        /* ====================================================================
           TEXT-TO-SPEECH (browser + optional ElevenLabs) — for the Brief
           ==================================================================== */
        var chosenVoice = null;
        function listVoices() { return ('speechSynthesis' in window) ? speechSynthesis.getVoices() : []; }
        function sayable(t) { return String(t == null ? '' : t).replace(/J\s*8\s*NIX/gi, 'Jay Eight Nix').replace(/\bJ8NIX\b/gi, 'Jay Eight Nix').replace(/™/g, ''); }
        function voiceScore(v) {
            var n = v.name.toLowerCase(), s = 0;
            if (/enhanced|premium|neural|natural/.test(n)) s += 50;
            ['ava', 'samantha', 'allison', 'serena', 'jenny', 'aria', 'sonia', 'libby', 'emma', 'nora', 'zoe', 'google us english', 'microsoft aria', 'microsoft jenny'].forEach(function (name, i) { if (n.indexOf(name) !== -1) s += 30 - i; });
            if (/female/.test(n)) s += 10;
            if (/en[-_]us/i.test(v.lang)) s += 8; else if (/en[-_]/i.test(v.lang)) s += 5;
            if (/compact|eloquence|albert|zarvox|trinoids|bells|boing|jester|bahh|bubbles|fred|junior|ralph|kathy|whisper/.test(n)) s -= 60;
            return s;
        }
        function pickVoice() {
            var voices = listVoices(); if (!voices.length) return; chosenVoice = null;
            if (state.settings.voiceName) { chosenVoice = voices.find(function (v) { return v.name === state.settings.voiceName; }) || null; if (chosenVoice) return; }
            var en = voices.filter(function (v) { return /en[-_]/i.test(v.lang); }); var pool = en.length ? en : voices;
            chosenVoice = pool.reduce(function (best, v) { return voiceScore(v) > voiceScore(best) ? v : best; }, pool[0]);
        }
        function browserSpeak(spoken) { if (!('speechSynthesis' in window)) return false; try { speechSynthesis.cancel(); var u = new SpeechSynthesisUtterance(spoken); if (!chosenVoice) pickVoice(); if (chosenVoice) u.voice = chosenVoice; u.pitch = 1.0; u.rate = 0.95; speechSynthesis.speak(u); return true; } catch (e) { return false; } }
        var premiumAudio = null;
        function speakPremium(spoken, onFail) {
            try {
                var voiceId = state.settings.ttsVoiceId || 'EXAVITQu4vr4xnSDxMaL';
                fetch('https://api.elevenlabs.io/v1/text-to-speech/' + encodeURIComponent(voiceId), { method: 'POST', headers: { 'xi-api-key': state.settings.ttsKey, 'content-type': 'application/json', 'accept': 'audio/mpeg' }, body: JSON.stringify({ text: spoken, model_id: 'eleven_turbo_v2_5', voice_settings: { stability: 0.45, similarity_boost: 0.8 } }) })
                    .then(function (res) { if (!res.ok) throw new Error('tts'); return res.blob(); })
                    .then(function (blob) { if (premiumAudio) { try { premiumAudio.pause(); } catch (e) {} } var url = URL.createObjectURL(blob); premiumAudio = new Audio(url); premiumAudio.onended = function () { URL.revokeObjectURL(url); }; premiumAudio.play(); })
                    .catch(function () { if (onFail) onFail(); });
            } catch (e) { if (onFail) onFail(); }
        }
        function speak(text) { if (!state.settings.voiceEnabled) return; var spoken = sayable(text); if (state.settings.ttsKey) speakPremium(spoken, function () { browserSpeak(spoken); }); else browserSpeak(spoken); }
        if ('speechSynthesis' in window) { speechSynthesis.onvoiceschanged = pickVoice; pickVoice(); }

        function briefText() {
            var name = (state.settings.userName.split(' ')[0]) || 'Dave';
            var order = { high: 0, med: 1, low: 2 };
            var items = state.waiting.slice().sort(function (a, b) { return order[a.pri] - order[b.pri]; });
            if (!items.length) return 'Nothing is waiting on you right now, ' + name + '. Clean board.';
            var msg = name + ', you have ' + items.length + ' item' + (items.length > 1 ? 's' : '') + ' waiting on you. ';
            var top = items.slice(0, 2).map(function (w) { return w.proj + ': ' + (w.doing[0] || ''); });
            msg += 'Top of the list — ' + top.join('. Then ') + '.';
            return msg;
        }
        function doBrief() { var t = briefText(); toast(t); speak(t); }

        /* ====================================================================
           PROMPT FORGE (offline by default) — proven engine, carried over
           ==================================================================== */
        function estTokens(s) { return Math.max(1, Math.round((s || '').length / 4)); }
        var FORGE_FILLERS = [
            [/\bin order to\b/gi, 'to'],
            [/\b(?:i was wondering if you could|i would like you to|i'd like you to|i want you to|i need you to)\b/gi, ''],
            [/\b(?:could|would|can) you(?: please)?\b/gi, ''],
            [/\b(?:please|kindly)\b/gi, ''],
            [/\b(?:basically|actually|literally|really|very|just|simply|sort of|kind of|you know|i think|i guess|i believe|maybe|perhaps)\b/gi, '']
        ];
        function compress(text, level) { var out = text; var n = level <= 0 ? 4 : FORGE_FILLERS.length; for (var i = 0; i < n; i++) out = out.replace(FORGE_FILLERS[i][0], FORGE_FILLERS[i][1]); return out.replace(/\s{2,}/g, ' ').replace(/\s+([,.;:!?])/g, '$1').trim(); }
        function joinConstraints(c) { return c.map(function (x) { return x.replace(/\.$/, ''); }).join('; '); }
        function detectRole(t) {
            if (/\b(code|function|bug|refactor|api|script|regex|sql|debug|firebase|typescript|javascript|python|css|html)\b/.test(t)) return 'a senior software engineer';
            if (/\b(summar(?:y|ize|ise)|tl;dr|condense|recap)\b/.test(t)) return 'an expert summarizer';
            if (/\b(analy(?:ze|se|sis)|research|compare|evaluate|assess|critique)\b/.test(t)) return 'a rigorous analyst';
            if (/\b(plan|strategy|roadmap|outline|schedule|prioriti)\b/.test(t)) return 'a strategic planner';
            if (/\b(design|ui|ux|layout|brand|logo|wireframe)\b/.test(t)) return 'a senior product designer';
            if (/\b(write|draft|copy|blog|article|essay|email|tweet|post|caption|headline|script|newsletter|tagline)\b/.test(t)) return 'an expert copywriter';
            return 'an expert assistant';
        }
        function detectFormat(t) {
            if (/\b(table|tabular|columns?)\b/.test(t)) return 'a Markdown table';
            if (/\bjson\b/.test(t)) return 'valid JSON only, no prose';
            if (/\b(bullet|bullets|list)\b/.test(t)) return 'a concise bullet list';
            if (/\b(steps?|step[- ]by[- ]step|how to|instructions?)\b/.test(t)) return 'numbered steps';
            if (/\b(code|function|script|snippet)\b/.test(t)) return 'a single code block';
            if (/\bemail\b/.test(t)) return 'a ready-to-send email';
            return 'concise prose';
        }
        function detectConstraints(t, target) {
            var c = []; var len = t.match(/\b(?:under|less than|max(?:imum)?(?: of)?|no more than|within|up to)\s+(\d+)\s*(words?|chars?|characters?|sentences?|bullets?|lines?|tokens?)/);
            if (len) c.push('Limit to ' + len[1] + ' ' + len[2] + '.'); else if (/\b(short|brief|concise|tl;dr|one[- ]line|one paragraph)\b/.test(t)) c.push('Keep it brief.');
            if (/\b(formal|professional)\b/.test(t)) c.push('Professional tone.');
            if (/\b(casual|friendly|informal|warm|playful)\b/.test(t)) c.push('Warm, casual tone.');
            if (/\b(beginner|simple|eli5|layman|non[- ]technical)\b/.test(t)) c.push('Explain simply, no jargon.');
            if (/\b(example|examples|sample)\b/.test(t)) c.push('Include one concrete example.');
            if (target === 'codex') c.unshift('Return only code unless asked to explain.');
            c.push('Be concise — no preamble or filler.');
            return c.filter(function (v, i) { return c.indexOf(v) === i; });
        }
        function cleanTask(text, level) { var t = compress(text, level).replace(/^[\s,.;:!?-]+/, '').replace(/^[a-z]/, function (m) { return m.toUpperCase(); }); if (!/[.!?]$/.test(t)) t += '.'; return t; }
        function forgePrompt(input, target, ctx, level) {
            input = (input || '').trim(); if (!input) return '';
            var lower = input.toLowerCase(); var role = detectRole(lower), fmt = detectFormat(lower), cons = detectConstraints(lower, target), task = cleanTask(input, level);
            ctx = (ctx || '').trim();
            if (level >= 2) { var roleNoun = role.replace(/^an? /, ''); var parts = [roleNoun + '.']; if (ctx) parts.push('Ctx: ' + ctx + '.'); parts.push(task); parts.push('Limits: ' + joinConstraints(cons) + '.'); parts.push('Out: ' + fmt + '.'); return compress(parts.join(' '), 2); }
            if (level === 1) { var seg = ['You are ' + role + '.']; if (ctx) seg.push('Context: ' + ctx + '.'); seg.push(task); seg.push('Constraints: ' + joinConstraints(cons) + '.'); seg.push('Output: ' + fmt + '.'); return seg.join(' '); }
            var lines = ['Role: You are ' + role + '.']; if (ctx) lines.push('Context: ' + ctx + '.'); lines.push('Task: ' + task); lines.push('Constraints:'); cons.forEach(function (c) { lines.push('- ' + c); }); lines.push('Output: ' + fmt + '.'); return lines.join('\n');
        }
        function refineWithAI(promptText, onText, onErr) {
            var s = state.settings; if (!s.apiKey) { onErr('Add your own API key in Settings to enable live AI refine.'); return; }
            var provider = s.aiProvider || 'anthropic';
            var sys = 'You are a prompt engineer. Rewrite the user content into the tightest, most token-efficient, well-structured prompt that fully preserves intent. Reply with ONLY the improved prompt — no preamble.';
            var url, headers, body, pick;
            if (provider === 'openai') { url = 'https://api.openai.com/v1/chat/completions'; headers = { 'content-type': 'application/json', 'authorization': 'Bearer ' + s.apiKey }; body = { model: s.apiModel || 'gpt-4o-mini', messages: [{ role: 'system', content: sys }, { role: 'user', content: promptText }] }; pick = function (d) { return d && d.choices && d.choices[0] && d.choices[0].message ? d.choices[0].message.content : ''; }; }
            else { url = 'https://api.anthropic.com/v1/messages'; headers = { 'content-type': 'application/json', 'x-api-key': s.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' }; body = { model: s.apiModel || 'claude-opus-4-8', max_tokens: 1024, system: sys, messages: [{ role: 'user', content: promptText }] }; pick = function (d) { if (!d || !d.content) return ''; var b = d.content.find(function (x) { return x.type === 'text'; }); return b ? b.text : ''; }; }
            fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(body) })
                .then(function (res) { return res.json().then(function (data) { if (!res.ok) { throw new Error((data && data.error && (data.error.message || data.error.type)) || ('HTTP ' + res.status)); } return data; }); })
                .then(function (data) { var out = (pick(data) || '').trim(); if (out) onText(out); else onErr('Empty response from the API.'); })
                .catch(function (e) { onErr(e.message || 'Request failed.'); });
        }
        function openForge(seed) {
            var level = 0;
            var input = el('textarea'); input.placeholder = 'Describe what you want in plain words…'; input.value = seed || '';
            var inField = field('Your request', input);
            var starters = [['📣 Launch tweet', 'write a short, friendly launch tweet with one example'], ['🐛 Debug code', 'find and fix the bug in this function and explain the cause'], ['📊 Summarize', 'summarize this document in 5 concise bullet points'], ['📧 Cold email', 'draft a brief, warm outreach email with a clear call to action'], ['🗺 Plan', 'outline a step-by-step plan to ship this project']];
            var chipsWrap = el('div', 'forge-chips'); chipsWrap.setAttribute('aria-label', 'Starter prompts');
            starters.forEach(function (s) { var c = el('button', 'chip', s[0]); c.type = 'button'; c.title = s[1]; c.addEventListener('click', function () { input.value = s[1]; level = 0; regen(); input.focus(); }); chipsWrap.appendChild(c); });
            var target = el('select'); [['claude', 'Claude'], ['codex', 'Codex / code model'], ['generic', 'Generic LLM']].forEach(function (o) { target.appendChild(new Option(o[1], o[0])); });
            var ctx = el('select'); ctx.appendChild(new Option('No project context', '')); state.projects.forEach(function (p) { ctx.appendChild(new Option(p.name, p.name)); });
            var grid = el('div', 'forge-grid'); grid.appendChild(field('Target', target)); grid.appendChild(field('Project context (optional)', ctx));
            var outLabel = el('div', 'forge-label', 'Engineered prompt');
            var out = el('textarea', 'forge-out'); out.readOnly = true; out.setAttribute('aria-label', 'Generated prompt'); out.placeholder = 'Your engineered prompt appears here.';
            var meta = el('div', 'forge-meta'); var tok = el('span', 'token-badge'); tok.appendChild(el('span', 'dot')); var tokTxt = el('span', null, '~0 tokens'); tok.appendChild(tokTxt);
            var lvl = el('span', 'forge-level'); meta.appendChild(tok); meta.appendChild(lvl);
            var actions = el('div', 'forge-actions');
            var copyBtn = btn('📋 Copy', 'primary', function () { if (out.value) copyText(out.value, 'Prompt copied.'); });
            var tightenBtn = btn('🗜 Tighten further', 'ghost', function () { if (level < 2) { level++; regen(); } if (level >= 2) tightenBtn.disabled = true; });
            var readBtn = btn('🔊 Read aloud', 'ghost', function () { if (out.value) speak('Optimized prompt, about ' + estTokens(out.value) + ' tokens. ' + out.value); });
            var aiBtn = btn('✨ Refine with AI', 'ghost', function () { if (!out.value) return; aiBtn.disabled = true; aiBtn.textContent = '✨ Refining…'; refineWithAI(out.value, function (text) { out.value = text; tokTxt.textContent = '~' + estTokens(text) + ' tokens'; lvl.textContent = 'AI-refined'; aiBtn.disabled = false; aiBtn.textContent = '✨ Refine with AI'; toast('Prompt refined.', 'success'); }, function (err) { aiBtn.disabled = false; aiBtn.textContent = '✨ Refine with AI'; toast(err, 'urgent'); }); });
            actions.appendChild(copyBtn); actions.appendChild(tightenBtn); actions.appendChild(readBtn); actions.appendChild(aiBtn);
            var aiNote = el('p', 'forge-note');
            function refreshAiNote() { if (state.settings.apiKey) { aiBtn.disabled = false; aiNote.textContent = '✨ Live refine uses your own ' + (state.settings.aiProvider === 'openai' ? 'OpenAI' : 'Anthropic') + ' key (local only).'; } else { aiBtn.disabled = true; aiNote.textContent = 'Live AI refine is off. The prompt above works fully offline — copy it into Claude or any tool. Add a key in Settings to enable refine.'; } }
            function regen() { var p = forgePrompt(input.value, target.value, ctx.value, level); out.value = p; var has = !!p; tokTxt.textContent = '~' + (has ? estTokens(p) : 0) + ' tokens'; lvl.textContent = has ? ['Standard', 'Tight', 'Tightest'][level] : ''; copyBtn.disabled = !has; readBtn.disabled = !has; tightenBtn.disabled = !has || level >= 2; aiBtn.disabled = !(state.settings.apiKey && has); }
            input.addEventListener('input', function () { level = 0; regen(); }); target.addEventListener('change', regen); ctx.addEventListener('change', regen);
            refreshAiNote(); regen();
            openModal('🔥 Prompt Forge', [inField, chipsWrap, grid, outLabel, out, meta, actions, aiNote], [btn('Done', 'ghost', closeModal)], true);
        }

        /* ---------- Clock ---------- */
        function tickClock() { $('#clockLabel').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

        /* ---------- Wire up ---------- */
        $('#briefBtn').addEventListener('click', doBrief);
        $('#forgeBtn').addEventListener('click', function () { openForge(''); });
        $('#helpBtn').addEventListener('click', openHelp);
        $('#settingsBtn').addEventListener('click', openSettings);
        $('#addWaitBtn').addEventListener('click', addWaiting);
        $('#claudeCopy').addEventListener('click', copyClaude);
        $('#claudeClear').addEventListener('click', function () { $('#claudeInput').value = ''; $('#claudeCtx').value = ''; $('#claudeInput').focus(); });
        $('#claudeInput').addEventListener('keydown', function (e) { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') copyClaude(); });

        /* ---------- Init ---------- */
        applyIdentity(); fillCtx(); renderPulse(); renderProjects(); renderWaiting();
        tickClock(); setInterval(tickClock, 30000);

        // read-only debug hook (no eval)
        window.J8NIX = { version: VERSION, reset: function () { localStorage.removeItem(STORE_KEY); location.reload(); }, state: function () { return state; } };
    })();
    </script>
